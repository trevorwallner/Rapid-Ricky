<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapid Ricky — Dart Tournament Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg: #0f1a14;
    --bg-grain: #12211a;
    --panel: #17241c;
    --panel-hi: #1d2e24;
    --border: #2b3b30;
    --line: #3a4a3e;
    --cream: #f0e9d8;
    --muted: #8fa094;
    --gold: #d1a944;
    --gold-dim: #6b5a2d;
    --red: #a63a2f;
    --shadow: rgba(0,0,0,0.45);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.03), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(255,255,255,0.02), transparent 40%),
      var(--bg);
    color:var(--cream);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1400px;margin:0 auto;padding:32px 24px 80px;}

  /* ---------- Header ---------- */
  header{
    display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:16px;
    border-bottom:2px dashed var(--line);
    padding-bottom:20px; margin-bottom:32px;
  }
  .brand{display:flex; align-items:center; gap:16px;}
  .brand svg{flex-shrink:0;}
  h1{
    font-family:'Anton', sans-serif;
    font-weight:400;
    font-size:clamp(28px, 5vw, 46px);
    letter-spacing:0.5px;
    margin:0;
    line-height:0.95;
    color:var(--cream);
  }
  h1 span{color:var(--gold);}
  .subtitle{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:1.5px;
    margin-top:4px;
  }
  .header-actions{display:flex; gap:10px; flex-wrap:wrap;}

  button, .btn{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.8px;
    background:var(--panel);
    color:var(--cream);
    border:1px solid var(--line);
    padding:10px 16px;
    cursor:pointer;
    border-radius:2px;
    transition:all 0.15s ease;
  }
  button:hover{border-color:var(--gold); color:var(--gold);}
  button.primary{background:var(--gold); color:#1a1408; border-color:var(--gold); font-weight:700;}
  button.primary:hover{background:#e0bb5c; color:#1a1408;}
  button.danger:hover{border-color:var(--red); color:#e08276;}
  button:disabled{opacity:0.35; cursor:not-allowed;}
  input[type=file]{display:none;}

  /* ---------- Setup screen ---------- */
  .setup-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:4px;
    padding:32px;
    max-width:640px;
  }
  .setup-card h2{
    font-family:'Anton', sans-serif; font-weight:400; font-size:22px; margin:0 0 6px;
  }
  .setup-card p{color:var(--muted); font-size:14px; line-height:1.6; margin:0 0 20px;}
  textarea{
    width:100%; min-height:220px;
    background:#0d1610; color:var(--cream);
    border:1px solid var(--border);
    font-family:'JetBrains Mono', monospace;
    font-size:14px; line-height:1.8;
    padding:14px; border-radius:2px;
    resize:vertical;
  }
  textarea:focus{outline:none; border-color:var(--gold);}
  .count-badge{
    display:inline-flex; align-items:center; gap:6px;
    font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--muted);
    margin-top:10px;
  }
  .count-badge b{color:var(--gold);}
  .setup-actions{margin-top:22px; display:flex; gap:10px;}

  /* ---------- Bracket ---------- */
  .bracket-scroll{overflow-x:auto; padding-bottom:20px;}
  .bracket{display:flex; gap:56px; align-items:stretch; min-width:max-content;}
  .round{display:flex; flex-direction:column; justify-content:space-around; min-width:230px; gap:0;}
  .round-label{
    font-family:'JetBrains Mono', monospace;
    font-size:11px; text-transform:uppercase; letter-spacing:1.5px;
    color:var(--gold); text-align:center; margin-bottom:14px;
  }
  .round-matches{display:flex; flex-direction:column; justify-content:space-around; flex:1; gap:24px;}
  .match-slot{position:relative; display:flex; align-items:center;}
  .match-slot::after{
    content:''; position:absolute; right:-56px; top:50%;
    width:56px; height:1px; background:var(--line);
  }
  .round:last-child .match-slot::after{display:none;}
  .match-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:3px;
    width:100%;
    overflow:hidden;
    box-shadow:0 4px 12px var(--shadow);
  }
  .player-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:11px 14px;
    font-size:14px; font-weight:500;
    cursor:pointer;
    border-bottom:1px solid var(--border);
    transition:background 0.12s ease;
  }
  .player-row:last-child{border-bottom:none;}
  .player-row:hover:not(.locked):not(.bye){background:var(--panel-hi);}
  .player-row.winner{color:var(--gold); font-weight:700;}
  .player-row.winner::before{content:'●  '; font-size:9px; position:relative; top:-2px;}
  .player-row.loser{color:var(--muted); text-decoration:line-through; text-decoration-color:var(--red);}
  .player-row.tbd{color:var(--muted); font-style:italic; cursor:default;}
  .player-row.bye{color:var(--muted); font-style:italic; cursor:default; font-size:12px;}
  .player-row.locked{cursor:default;}
  .player-row .tag{
    font-family:'JetBrains Mono', monospace; font-size:9px; color:var(--muted);
    text-transform:uppercase; letter-spacing:1px;
  }

  .champion-card{
    margin-top:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-width:230px; text-align:center;
  }
  .champion-card .crown{font-size:28px; margin-bottom:6px;}
  .champion-card .label{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--muted);
    text-transform:uppercase; letter-spacing:2px; margin-bottom:8px;
  }
  .champion-card .name{
    font-family:'Anton', sans-serif; font-size:28px; color:var(--gold);
    border:2px solid var(--gold); border-radius:4px; padding:14px 24px;
    background:rgba(209,169,68,0.08);
  }

  footer{
    margin-top:48px; padding-top:20px; border-top:1px dashed var(--line);
    color:var(--muted); font-size:12px; font-family:'JetBrains Mono', monospace;
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  footer a{color:var(--gold); text-decoration:none;}

  .hint{
    background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--gold);
    padding:12px 16px; font-size:13px; color:var(--muted); border-radius:2px; margin-bottom:24px; max-width:640px;
    line-height:1.6;
  }
  .hint b{color:var(--cream);}

  @media (max-width:640px){
    .setup-card{padding:20px;}
    header{flex-direction:column; align-items:flex-start;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <svg width="46" height="46" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="none" stroke="#a63a2f" stroke-width="6"/>
        <circle cx="50" cy="50" r="34" fill="none" stroke="#f0e9d8" stroke-width="6"/>
        <circle cx="50" cy="50" r="20" fill="none" stroke="#a63a2f" stroke-width="6"/>
        <circle cx="50" cy="50" r="7" fill="#d1a944"/>
      </svg>
      <div>
        <h1>RAPID <span>RICKY</span></h1>
        <div class="subtitle" id="statusLine">Single-elimination · one leg per match</div>
      </div>
    </div>
    <div class="header-actions" id="headerActions"></div>
  </header>

  <div id="app"></div>

  <footer>
    <span>Data is stored in this browser only. Use <b style="color:var(--cream)">Export</b> to share or back up.</span>
    <span id="playerCountFooter"></span>
  </footer>
</div>

<input type="file" id="importFile" accept="application/json">

<script>
const STORAGE_KEY = 'rapidRickyTournament';

/* ---------------- Firebase (optional live sync) ----------------
   Paste the config object Firebase gave you below. Leave it as-is
   (with "YOUR_API_KEY") to keep using this browser's local storage
   instead — everything still works, it just won't sync live.
------------------------------------------------------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyBQ2U-yhW9b1u5vJ3GpbDVjiihTkaVexa8",
  authDomain: "bock-party-rapid-ricky.firebaseapp.com",
  projectId: "bock-party-rapid-ricky",
  storageBucket: "bock-party-rapid-ricky.firebasestorage.app",
  messagingSenderId: "858204381660",
  appId: "1:858204381660:web:e4d4ec2c8e7778b8e7ef19"
};

const FIREBASE_ENABLED = !!(firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY");

// Everyone who opens the page with the same ?room=xyz shares one bracket.
// Handy if you ever want to run two tournaments at once from one Firebase project.
const roomId = new URLSearchParams(location.search).get('room') || 'rapid-ricky';

let db = null, docRef = null;
if(FIREBASE_ENABLED){
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  docRef = db.collection('tournaments').doc(roomId);
}

/* ---------------- State ---------------- */
let state = { players: [], rounds: [], started: false };

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function save(){
  if(FIREBASE_ENABLED && docRef){
    docRef.set(state).catch(err => {
      console.error('Firebase save failed', err);
      statusLine.textContent = 'Sync error — check Firestore rules (see console)';
    });
  } else {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }
}

/* ---------------- Bracket generation ---------------- */
function nextPow2(n){ let p = 1; while(p < n) p *= 2; return p; }

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateBracket(players){
  const size = nextPow2(players.length);
  const byes = size - players.length;
  let slots = players.slice();
  for(let i=0; i<byes; i++) slots.push(null);
  slots = shuffle(slots);

  const round1 = [];
  for(let i=0; i<slots.length; i+=2){
    const p1 = slots[i], p2 = slots[i+1];
    let winner = null;
    if(p1 === null && p2 !== null) winner = p2;
    if(p2 === null && p1 !== null) winner = p1;
    round1.push({ p1, p2, winner });
  }

  const rounds = [round1];
  let numMatches = round1.length;
  while(numMatches > 1){
    const round = [];
    for(let i=0; i<numMatches/2; i++){
      round.push({ p1: 'TBD', p2: 'TBD', winner: null });
    }
    rounds.push(round);
    numMatches = round.length;
  }
  propagateAll(rounds);
  return rounds;
}

function propagateAll(rounds){
  for(let r=1; r<rounds.length; r++){
    const prev = rounds[r-1];
    const round = rounds[r];
    for(let i=0; i<round.length; i++){
      const m1 = prev[2*i], m2 = prev[2*i+1];
      const newP1 = m1.winner || 'TBD';
      const newP2 = m2.winner || 'TBD';
      if(round[i].p1 !== newP1 || round[i].p2 !== newP2){
        round[i].p1 = newP1;
        round[i].p2 = newP2;
        round[i].winner = null;
      }
    }
  }
}

function setWinner(roundIdx, matchIdx, player){
  const match = state.rounds[roundIdx][matchIdx];
  if(match.p1 === null || match.p2 === null) return; // bye, locked
  if(player !== match.p1 && player !== match.p2) return;
  match.winner = player;
  propagateAll(state.rounds);
  save();
  render();
}

function getChampion(){
  if(!state.rounds.length) return null;
  const finalRound = state.rounds[state.rounds.length - 1];
  if(finalRound.length === 1) return finalRound[0].winner;
  return null;
}

/* ---------------- Actions ---------------- */
function startTournament(names){
  const cleaned = names.map(n => n.trim()).filter(Boolean);
  const unique = [...new Set(cleaned)];
  if(unique.length < 2){
    alert('Enter at least 2 player names (one per line).');
    return;
  }
  state = { players: unique, rounds: generateBracket(unique), started: true };
  save();
  render();
}

function resetTournament(){
  if(!confirm('Reset the whole tournament? This clears the bracket and player list.')) return;
  state = { players: [], rounds: [], started: false };
  save();
  render();
}

function reshuffleBracket(){
  if(!confirm('Re-shuffle and regenerate the bracket with the same players? All results will be cleared.')) return;
  state.rounds = generateBracket(state.players);
  save();
  render();
}

function editPlayers(){
  const currentList = state.players.join('\n');
  const input = prompt(
    'Edit player names (one per line). Renaming here updates that player everywhere in the bracket.\n' +
    'Note: adding/removing players will reset and regenerate the bracket.',
    currentList
  );
  if(input === null) return;
  const newNames = input.split('\n').map(n => n.trim()).filter(Boolean);
  const unique = [...new Set(newNames)];
  if(unique.length < 2){
    alert('Need at least 2 players.');
    return;
  }
  const sameSet = unique.length === state.players.length &&
    unique.every((n, i) => true) &&
    state.players.every(p => true);

  if(unique.length === state.players.length){
    // Treat as rename-in-place: map old->new by position isn't safe; instead
    // find renamed entries by simple diff (names removed vs names added).
    const removed = state.players.filter(p => !unique.includes(p));
    const added = unique.filter(n => !state.players.includes(n));
    if(removed.length === added.length && removed.length > 0){
      removed.forEach((oldName, i) => renamePlayerEverywhere(oldName, added[i]));
      state.players = unique;
      save();
      render();
      return;
    } else if(removed.length === 0 && added.length === 0){
      // no change
      return;
    }
  }
  // Player count changed, or complex rename -> full reset with new list
  if(!confirm('This changes the number of players, so the bracket will be regenerated from scratch. Continue?')) return;
  state = { players: unique, rounds: generateBracket(unique), started: true };
  save();
  render();
}

function renamePlayerEverywhere(oldName, newName){
  state.rounds.forEach(round => {
    round.forEach(match => {
      if(match.p1 === oldName) match.p1 = newName;
      if(match.p2 === oldName) match.p2 = newName;
      if(match.winner === oldName) match.winner = newName;
    });
  });
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'rapid-ricky-tournament.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(file){
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed.rounds || !parsed.players){ throw new Error('bad shape'); }
      state = parsed;
      save();
      render();
    }catch(err){
      alert('Could not read that file — is it a Rapid Ricky export?');
    }
  };
  reader.readAsText(file);
}

/* ---------------- Rendering ---------------- */
const app = document.getElementById('app');
const headerActions = document.getElementById('headerActions');
const statusLine = document.getElementById('statusLine');
const playerCountFooter = document.getElementById('playerCountFooter');
const importFile = document.getElementById('importFile');

importFile.addEventListener('change', e => {
  if(e.target.files[0]) importJSON(e.target.files[0]);
  e.target.value = '';
});

function renderHeaderActions(){
  headerActions.innerHTML = '';
  if(state.started){
    const btns = [
      ['Edit players', editPlayers, ''],
      ['Re-shuffle', reshuffleBracket, ''],
      ['Export JSON', exportJSON, ''],
      ['Import JSON', () => importFile.click(), ''],
      ['Reset', resetTournament, 'danger'],
    ];
    btns.forEach(([label, fn, cls]) => {
      const b = document.createElement('button');
      b.textContent = label;
      if(cls) b.classList.add(cls);
      b.onclick = fn;
      headerActions.appendChild(b);
    });
  } else {
    const importBtn = document.createElement('button');
    importBtn.textContent = 'Import JSON';
    importBtn.onclick = () => importFile.click();
    headerActions.appendChild(importBtn);
  }
}

function roundLabel(idx, total){
  const remaining = total - idx;
  if(remaining === 1) return 'Final';
  if(remaining === 2) return 'Semifinals';
  if(remaining === 3) return 'Quarterfinals';
  return `Round ${idx + 1}`;
}

function renderSetup(){
  app.innerHTML = `
    <div class="hint">
      <b>How this works:</b> paste one player name per line, hit start, and a randomized
      single-elimination bracket is generated with byes handled automatically if the count
      isn't a power of two. Click a name in a match to set the winner — matches downstream
      update automatically. Click again anytime to correct a mistake.
    </div>
    <div class="setup-card">
      <h2>Enter players</h2>
      <p>One name per line. Minimum 2 players — any number works, byes are handled for you.</p>
      <textarea id="playerInput" placeholder="Ricky
Dave
Steve
Nige
..."></textarea>
      <div class="count-badge" id="countBadge">0 players</div>
      <div class="setup-actions">
        <button class="primary" id="startBtn">Shuffle &amp; start tournament</button>
      </div>
    </div>
  `;
  const textarea = document.getElementById('playerInput');
  const countBadge = document.getElementById('countBadge');
  const updateCount = () => {
    const n = textarea.value.split('\n').map(s=>s.trim()).filter(Boolean).length;
    countBadge.innerHTML = `<b>${n}</b> player${n===1?'':'s'} entered`;
  };
  textarea.addEventListener('input', updateCount);
  updateCount();
  document.getElementById('startBtn').onclick = () => {
    startTournament(textarea.value.split('\n'));
  };
}

function playerRowHTML(roundIdx, matchIdx, match, player, slotKey){
  if(player === null){
    return `<div class="player-row bye"><span>— BYE —</span></div>`;
  }
  if(player === 'TBD'){
    return `<div class="player-row tbd"><span>TBD</span></div>`;
  }
  const isWinner = match.winner === player;
  const isLoser = match.winner && match.winner !== player;
  const classes = ['player-row'];
  if(isWinner) classes.push('winner');
  if(isLoser) classes.push('loser');
  return `<div class="${classes.join(' ')}" data-round="${roundIdx}" data-match="${matchIdx}" data-player="${encodeURIComponent(player)}">
    <span>${escapeHTML(player)}</span>
    ${isWinner ? '<span class="tag">WINS</span>' : ''}
  </div>`;
}

function escapeHTML(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function renderBracket(){
  const rounds = state.rounds;
  const champion = getChampion();

  let html = `<div class="bracket-scroll"><div class="bracket">`;
  rounds.forEach((round, rIdx) => {
    html += `<div class="round">
      <div class="round-label">${roundLabel(rIdx, rounds.length)}</div>
      <div class="round-matches">`;
    round.forEach((match, mIdx) => {
      html += `<div class="match-slot"><div class="match-card">
        ${playerRowHTML(rIdx, mIdx, match, match.p1)}
        ${playerRowHTML(rIdx, mIdx, match, match.p2)}
      </div></div>`;
    });
    html += `</div></div>`;
  });

  html += `<div class="round"><div class="round-label">Champion</div>
    <div class="round-matches" style="justify-content:center;">
      <div class="champion-card">
        <div class="crown">${champion ? '🏆' : '🎯'}</div>
        <div class="label">${champion ? 'Tournament winner' : 'To be decided'}</div>
        <div class="name">${champion ? escapeHTML(champion) : '???'}</div>
      </div>
    </div></div>`;

  html += `</div></div>`;
  app.innerHTML = html;

  app.querySelectorAll('.player-row[data-player]').forEach(row => {
    row.addEventListener('click', () => {
      const r = parseInt(row.dataset.round, 10);
      const m = parseInt(row.dataset.match, 10);
      const player = decodeURIComponent(row.dataset.player);
      setWinner(r, m, player);
    });
  });
}

function render(){
  renderHeaderActions();
  if(!state.started || !state.rounds.length){
    renderSetup();
    statusLine.textContent = 'Single-elimination · one leg per match';
    playerCountFooter.textContent = '';
  } else {
    renderBracket();
    const champion = getChampion();
    statusLine.textContent = champion
      ? `Champion crowned: ${champion}`
      : `${state.players.length} players · ${state.rounds.length} round${state.rounds.length===1?'':'s'}`;
    playerCountFooter.textContent = `${state.players.length} players in bracket`;
  }
}

if(FIREBASE_ENABLED && docRef){
  statusLine.textContent = `Live sync on · room "${roomId}"`;
  let resolved = false;
  const fallbackTimer = setTimeout(() => {
    if(resolved) return;
    resolved = true;
    console.warn('Firestore did not respond in time — falling back to local-only mode. This usually means the network (e.g. a work/school firewall) is blocking the connection.');
    state = load() || { players: [], rounds: [], started: false };
    statusLine.textContent = 'Local mode (could not reach live sync)';
    render();
  }, 6000);

  docRef.onSnapshot(snap => {
    resolved = true;
    clearTimeout(fallbackTimer);
    state = snap.exists() ? snap.data() : { players: [], rounds: [], started: false };
    render();
  }, err => {
    resolved = true;
    clearTimeout(fallbackTimer);
    console.error('Firebase sync error', err);
    state = load() || { players: [], rounds: [], started: false };
    statusLine.textContent = 'Local mode (live sync error — check Firestore rules)';
    render();
  });
} else {
  state = load() || { players: [], rounds: [], started: false };
  render();
}
</script>
</body>
</html>
